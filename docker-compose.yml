services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: zapfinance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senhasegura}
      POSTGRES_DB: zapfinance
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapfinance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
