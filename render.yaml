services:
  - type: web
    name: finn-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finn-db
          property: connectionURI
      - key: GROQ_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: finn-backend
          property: url
      - key: MY_PHONE
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: finn-db
    plan: free
    databaseName: zapfinance
    user: zapfinance
